<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Интерактивная карта номенклатуры регионов России</title>
  <link rel="preconnect" href="https://unpkg.com" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <style>
    :root {
      --bg1: #dbeafe;
      --bg2: #f0f9ff;
      --panel: rgba(255,255,255,0.92);
      --panel-2: rgba(248,250,252,0.96);
      --text: #0f172a;
      --muted: #64748b;
      --accent: #2563eb;
      --accent-2: #06b6d4;
      --accent-3: #8b5cf6;
      --border: rgba(15, 23, 42, 0.08);
      --shadow: 0 14px 40px rgba(2, 8, 23, 0.15);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(37,99,235,.18), transparent 34%),
        radial-gradient(circle at top right, rgba(6,182,212,.14), transparent 30%),
        linear-gradient(180deg, var(--bg1), var(--bg2) 44%, #f8fafc 100%);
    }

    .app {
      display: grid;
      grid-template-columns: 390px 1fr;
      gap: 16px;
      min-height: 100vh;
      padding: 16px;
    }

    .sidebar {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    .sidebar-header {
      padding: 22px 20px 14px;
      background: linear-gradient(135deg, rgba(37,99,235,.10), rgba(139,92,246,.08));
      border-bottom: 1px solid rgba(15,23,42,.06);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.3rem;
      line-height: 1.2;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: .93rem;
      line-height: 1.45;
    }

    .controls {
      padding: 16px 20px 12px;
      display: grid;
      gap: 12px;
      background: var(--panel-2);
      border-bottom: 1px solid rgba(15,23,42,.06);
    }

    .theme-buttons,
    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .theme-btn,
    .chip {
      border: 1px solid rgba(37,99,235,.12);
      background: white;
      color: var(--text);
      padding: 9px 12px;
      border-radius: 999px;
      font-size: .86rem;
      cursor: pointer;
      transition: .18s ease;
    }

    .theme-btn:hover,
    .theme-btn.active,
    .chip:hover,
    .chip.active {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      border-color: transparent;
      transform: translateY(-1px);
    }

    .search-wrap {
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      opacity: .55;
    }

    .search-wrap input {
      width: 100%;
      border: 1px solid rgba(148,163,184,.35);
      border-radius: 16px;
      padding: 12px 14px 12px 40px;
      font-size: .98rem;
      outline: none;
      background: white;
      color: var(--text);
      transition: .2s ease;
    }

    .search-wrap input:focus {
      border-color: rgba(37,99,235,.55);
      box-shadow: 0 0 0 4px rgba(37,99,235,.10);
    }

    .stats {
      color: var(--muted);
      font-size: .9rem;
    }

    .list {
      padding: 12px;
      overflow: auto;
      display: grid;
      gap: 10px;
    }

    .item {
      background: white;
      border: 1px solid rgba(15,23,42,.06);
      border-radius: 18px;
      padding: 12px 14px;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(15,23,42,.04);
      transition: .18s ease;
    }

    .item:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(15,23,42,.08);
      border-color: rgba(37,99,235,.18);
    }

    .item-title {
      font-weight: 700;
      font-size: .97rem;
      margin-bottom: 5px;
    }

    .item-meta {
      color: var(--muted);
      font-size: .86rem;
      line-height: 1.42;
    }

    .map-wrap {
      position: relative;
      min-height: calc(100vh - 32px);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,.35);
    }

    #map {
      width: 100%;
      min-height: calc(100vh - 32px);
      height: 100%;
    }

    .map-overlay {
      position: absolute;
      right: 16px;
      top: 16px;
      z-index: 500;
      max-width: 360px;
      background: rgba(255,255,255,.92);
      border: 1px solid rgba(15,23,42,.06);
      border-radius: 18px;
      padding: 12px 14px;
      box-shadow: 0 10px 24px rgba(15,23,42,.12);
      backdrop-filter: blur(8px);
    }

    .map-overlay h2 {
      margin: 0 0 6px;
      font-size: .98rem;
    }

    .map-overlay p {
      margin: 0;
      font-size: .86rem;
      line-height: 1.45;
      color: var(--muted);
    }

    .leaflet-tooltip.custom-tooltip {
      background: rgba(15,23,42,.94);
      color: #fff;
      border: none;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,.18);
      padding: 8px 10px;
      font-size: .88rem;
    }

    .leaflet-tooltip.custom-tooltip:before { display: none; }

    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { min-height: 48vh; }
      .map-wrap, #map { min-height: 62vh; }
      .map-overlay { max-width: calc(100% - 32px); }
    }
  </style>
</head>

    <aside class="sidebar">

        <h1>Интерактивная карта номенклатуры</h1>
        <p class="subtitle">Выбери тему кнопкой, ищи объекты по названию и наводи на точки на карте, чтобы увидеть подписи.</p>
      </div>

      <div class="controls">
        <div>

          <div class="theme-buttons" id="themeButtons"></div>
        </div>

        <div class="search-wrap">
          <span class="search-icon">🔎</span>
          <input id="searchInput" type="text" placeholder="Поиск: Эльбрус, Сыктывкар, Ладожское..." />
        </div>

        <div class="chip-row" id="categoryChips"></div>
        <div class="stats" id="stats"></div>
      </div>

      <div class="list" id="resultsList"></div>
    </aside>

      </div>
    </main>

          { name: 'Онежское озеро', category: 'Озёра', lat: 61.8, lng: 35.5, description: 'Озеро' },
          { name: 'Чудское озеро', category: 'Озёра', lat: 58.6, lng: 27.5, description: 'Озеро' },
          { name: 'Псковское озеро', category: 'Озёра', lat: 57.8, lng: 27.9, description: 'Озеро' },
          { name: 'Ильмень', category: 'Озёра', lat: 58.3, lng: 31.3, description: 'Озеро' },
          { name: 'Селигер', category: 'Озёра', lat: 57.2, lng: 33.1, description: 'Озеро' },
          { name: 'Ленинградская область', category: 'Регионы', lat: 59.9, lng: 30.7, description: 'Область' },
          { name: 'Санкт-Петербург', category: 'Регионы', lat: 59.94, lng: 30.31, description: 'Город федерального значения' },
          { name: 'Новгородская область', category: 'Регионы', lat: 58.52, lng: 31.27, description: 'Область' },
          { name: 'Псковская область', category: 'Регионы', lat: 57.82, lng: 28.33, description: 'Область' },
          { name: 'Калининградская область', category: 'Регионы', lat: 54.71, lng: 20.51, description: 'Область' }
        ]
      }
    };

    const palette = {
      'Моря': '#2563eb',
      'Заливы': '#06b6d4',
      'Проливы': '#0ea5e9',
      'Полуострова': '#14b8a6',
      'Острова': '#22c55e',
      'Равнины': '#84cc16',
      'Возвышенности': '#65a30d',
      'Горы': '#f59e0b',
      'Вершины': '#ef4444',
      'Реки': '#3b82f6',
      'Озёра': '#38bdf8',
      'Каналы': '#60a5fa',
      'Регионы': '#8b5cf6',
      'Административные центры': '#ec4899'
    };

    const map = L.map('map', { zoomControl: true });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 18,
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    const markerLayer = L.layerGroup().addTo(map);
    const themeButtons = document.getElementById('themeButtons');
    const categoryChips = document.getElementById('categoryChips');
    const resultsList = document.getElementById('resultsList');
    const stats = document.getElementById('stats');
    const searchInput = document.getElementById('searchInput');
    const overlayTitle = document.getElementById('overlayTitle');
    const overlayText = document.getElementById('overlayText');

    let activeTheme = 'Европейский юг';
    let activeCategory = 'Все';

    function markerStyle(category) {
      return {
        radius: category === 'Административные центры' ? 7 : 9,
        fillColor: palette[category] || '#334155',
        color: '#ffffff',
        weight: 2,
        opacity: 1,
        fillOpacity: 0.92
      };
    }

    function createMarker(item) {
      const marker = L.circleMarker([item.lat, item.lng], markerStyle(item.category));
      const tooltip = `<strong>${item.name}</strong><br>${item.category}${item.capital ? `<br>Центр: ${item.capital}` : ''}`;
      marker.bindTooltip(tooltip, {
        direction: 'top',
        offset: [0, -8],
        className: 'custom-tooltip'
      });
      marker.on('click', () => {
        map.flyTo([item.lat, item.lng], Math.max(map.getZoom(), 7), { duration: 0.6 });
        marker.openTooltip();
      });
      return marker;
    }

    function currentData() {
      return datasets[activeTheme];
    }

    function buildThemeButtons() {
      themeButtons.innerHTML = '';
      Object.keys(datasets).forEach(theme => {
        const btn = document.createElement('button');
        btn.className = 'theme-btn' + (theme === activeTheme ? ' active' : '');
        btn.textContent = theme;
        btn.addEventListener('click', () => {
          activeTheme = theme;
          activeCategory = 'Все';
          searchInput.value = '';
          buildThemeButtons();
          buildCategoryChips();
          render();
        });
        themeButtons.appendChild(btn);
      });
    }

    function buildCategoryChips() {
      categoryChips.innerHTML = '';
      const categories = ['Все', ...new Set(currentData().points.map(p => p.category))];
      categories.forEach(category => {
        const chip = document.createElement('button');
        chip.className = 'chip' + (category === activeCategory ? ' active' : '');
        chip.textContent = category;
        chip.addEventListener('click', () => {
          activeCategory = category;
          buildCategoryChips();
          renderListAndMarkers();
        });
        categoryChips.appendChild(chip);
      });
    }

    function filteredPoints() {
      const q = searchInput.value.trim().toLowerCase();
      return currentData().points.filter(item => {
        const categoryMatch = activeCategory === 'Все' || item.category === activeCategory;
        const haystack = `${item.name} ${item.category} ${item.description || ''} ${item.capital || ''}`.toLowerCase();
        const searchMatch = !q || haystack.includes(q);
        return categoryMatch && searchMatch;
      });
    }

    function renderList(items) {
      resultsList.innerHTML = '';
      if (!items.length) {
        const empty = document.createElement('div');
        empty.className = 'item';
        empty.innerHTML = '<div class="item-title">Ничего не найдено</div><div class="item-meta">Сбрось фильтр или измени поисковый запрос.</div>';
        resultsList.appendChild(empty);
        return;
      }

      items.forEach(item => {
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `
          <div class="item-title">${item.name}</div>
          <div class="item-meta">${item.category}${item.capital ? ` • центр: ${item.capital}` : ''}<br>${item.description || ''}</div>
        `;
        div.addEventListener('click', () => {
          map.flyTo([item.lat, item.lng], 7, { duration: 0.6 });
        });
        resultsList.appendChild(div);
      });
    }

    function renderMarkers(items) {
      markerLayer.clearLayers();
      const bounds = [];
      items.forEach(item => {
        markerLayer.addLayer(createMarker(item));
        bounds.push([item.lat, item.lng]);
      });
      if (bounds.length) {
        map.fitBounds(bounds, { padding: [30, 30], maxZoom: currentData().zoom + 1 });
      } else {
        map.setView(currentData().center, currentData().zoom);
      }
    }

    function renderListAndMarkers() {
      const items = filteredPoints();
      renderList(items);
      renderMarkers(items);
      stats.textContent = `Тема: ${activeTheme} • показано объектов: ${items.length} из ${currentData().points.length}`;
    }

    function render() {
      const data = currentData();
      overlayTitle.textContent = activeTheme;
      overlayText.textContent = data.description + ' Координаты нанесены ориентировочно для учебной визуализации.';
      map.setView(data.center, data.zoom);
      renderListAndMarkers();
    }

    searchInput.addEventListener('input', renderListAndMarkers);

    buildThemeButtons();
    buildCategoryChips();
    render();
  </script>
</body>
</html>
